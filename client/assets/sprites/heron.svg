<svg xmlns="http://www.w3.org/2000/svg" width="96" height="48" viewBox="0 0 96 48">
  <!-- Heron enemy sprite sheet (Phase 2 §4): 2 frames, 48x48 each, side by
       side. A lanky long-legged/long-necked bird that circles at range then
       dive-swoops. Matches the existing wasp/snail style: flat fills,
       ~1.5-2.5px black outlines, transparent background.
       Frame 0 (x=0..48):  neck curled back, wings up  (circling glide)
       Frame 1 (x=48..96): neck extended forward, wings down (wobble/flap)
       Alternate frames each tick for a simple flight wobble. -->

  <!-- ===== Frame 0: wings up, neck curled ===== -->
  <g transform="translate(0,0)">
    <!-- long trailing legs -->
    <path d="M 20 34 L 14 46" stroke="#000000" stroke-width="2" fill="none"/>
    <path d="M 24 35 L 20 47" stroke="#000000" stroke-width="2" fill="none"/>
    <path d="M 12 46 L 8 46" stroke="#000000" stroke-width="2" fill="none"/>
    <path d="M 18 47 L 14 47" stroke="#000000" stroke-width="2" fill="none"/>
    <!-- wings, angled up -->
    <path d="M 22 20 Q 6 8 4 18 Q 14 24 22 26 Z" fill="#c9d6da" stroke="#000000" stroke-width="1.8"/>
    <path d="M 30 20 Q 46 8 48 18 Q 38 24 30 26 Z" fill="#c9d6da" stroke="#000000" stroke-width="1.8"/>
    <!-- body -->
    <ellipse cx="26" cy="26" rx="11" ry="8" fill="#e7edee" stroke="#000000" stroke-width="2"/>
    <!-- curled neck -->
    <path d="M 20 20 Q 12 10 20 6 Q 26 4 30 8" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
    <path d="M 20 20 Q 12 10 20 6 Q 26 4 30 8" fill="none" stroke="#b0c4c9" stroke-width="3.4" stroke-linecap="round" opacity="0.9"/>
    <!-- head -->
    <circle cx="30" cy="7" r="4.2" fill="#e7edee" stroke="#000000" stroke-width="1.8"/>
    <!-- beak -->
    <path d="M 34 6 L 42 5 L 34 9 Z" fill="#f4a731" stroke="#000000" stroke-width="1.3"/>
    <!-- eye -->
    <circle cx="31.5" cy="6" r="0.9" fill="#000000"/>
    <!-- crest feather -->
    <path d="M 27 3 L 24 0" stroke="#000000" stroke-width="1.4" fill="none"/>
  </g>

  <!-- ===== Frame 1: wings down, neck extended forward ===== -->
  <g transform="translate(48,0)">
    <path d="M 20 34 L 15 46" stroke="#000000" stroke-width="2" fill="none"/>
    <path d="M 25 35 L 22 47" stroke="#000000" stroke-width="2" fill="none"/>
    <path d="M 13 46 L 9 46" stroke="#000000" stroke-width="2" fill="none"/>
    <path d="M 20 47 L 16 47" stroke="#000000" stroke-width="2" fill="none"/>
    <!-- wings, angled down -->
    <path d="M 22 24 Q 8 34 6 26 Q 14 22 22 22 Z" fill="#c9d6da" stroke="#000000" stroke-width="1.8"/>
    <path d="M 30 24 Q 44 34 46 26 Q 38 22 30 22 Z" fill="#c9d6da" stroke="#000000" stroke-width="1.8"/>
    <!-- body -->
    <ellipse cx="26" cy="27" rx="11" ry="8" fill="#e7edee" stroke="#000000" stroke-width="2"/>
    <!-- extended neck, reaching forward -->
    <path d="M 22 21 Q 26 10 38 8" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
    <path d="M 22 21 Q 26 10 38 8" fill="none" stroke="#b0c4c9" stroke-width="3.4" stroke-linecap="round" opacity="0.9"/>
    <!-- head -->
    <circle cx="39" cy="8" r="4.2" fill="#e7edee" stroke="#000000" stroke-width="1.8"/>
    <!-- beak, pointed toward dive direction -->
    <path d="M 43 7 L 47 12 L 43 10 Z" fill="#f4a731" stroke="#000000" stroke-width="1.3"/>
    <!-- eye -->
    <circle cx="40.5" cy="7" r="0.9" fill="#000000"/>
    <!-- crest feather -->
    <path d="M 36 4 L 33 1" stroke="#000000" stroke-width="1.4" fill="none"/>
  </g>
</svg>
