<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Frogtato player frog, top-down-ish, drawn in WHITE + BLACK OUTLINE ONLY
       so the client can Phaser-tint it per player (green/blue/orange/pink).
       Black stays black under multiply-tint; white becomes the tint color. -->
  <g stroke="#000000" stroke-width="2" stroke-linejoin="round" fill="#ffffff">
    <!-- back legs, splayed -->
    <ellipse cx="9"  cy="34" rx="6" ry="8" transform="rotate(-25 9 34)"/>
    <ellipse cx="39" cy="34" rx="6" ry="8" transform="rotate(25 39 34)"/>
    <!-- front legs -->
    <ellipse cx="13" cy="19" rx="4.5" ry="6" transform="rotate(-15 13 19)"/>
    <ellipse cx="35" cy="19" rx="4.5" ry="6" transform="rotate(15 35 19)"/>
    <!-- body -->
    <ellipse cx="24" cy="26" rx="15" ry="13"/>
    <!-- eye bumps on top of head -->
    <circle cx="16" cy="12" r="6.5"/>
    <circle cx="32" cy="12" r="6.5"/>
  </g>
  <!-- pupils: kept black so they read as eyes at any tint -->
  <circle cx="16" cy="12" r="2.6" fill="#000000"/>
  <circle cx="32" cy="12" r="2.6" fill="#000000"/>
  <!-- subtle white eye-shine, purely cosmetic -->
  <circle cx="17.3" cy="10.5" r="1" fill="#ffffff"/>
  <circle cx="33.3" cy="10.5" r="1" fill="#ffffff"/>
  <!-- soft belly shading using light gray (still multiplies cleanly under tint) -->
  <ellipse cx="24" cy="31" rx="8" ry="5" fill="#e8e8e8" stroke="none"/>
</svg>
