<svg xmlns="http://www.w3.org/2000/svg" width="80" height="40" viewBox="0 0 80 40">
  <!-- Snail Spitter enemy sprite sheet: 2 frames, 40x40 each, side by side.
       Frame 0 (x=0..40):  shell neutral
       Frame 1 (x=40..80): shell tilted/wobbled slightly
       Alternate frames for the idle shell-wobble. -->

  <!-- ===== Frame 0 ===== -->
  <g transform="translate(0,0)">
    <!-- foot/body -->
    <path d="M 6 32 Q 6 24 16 22 Q 28 20 34 26 Q 36 30 32 33 Q 20 37 10 35 Q 6 34 6 32 Z"
          fill="#8fd694" stroke="#000000" stroke-width="2"/>
    <!-- shell -->
    <circle cx="26" cy="18" r="13" fill="#c97a3d" stroke="#000000" stroke-width="2"/>
    <path d="M 26 18 m -9 0 a 9 9 0 1 0 18 0 a 9 9 0 1 0 -18 0" fill="none" stroke="#000000" stroke-width="1.3"/>
    <circle cx="26" cy="18" r="5" fill="none" stroke="#000000" stroke-width="1.3"/>
    <circle cx="26" cy="18" r="1.6" fill="#000000"/>
    <!-- eye stalks -->
    <path d="M 8 24 L 4 15" stroke="#000000" stroke-width="2" fill="none"/>
    <path d="M 13 23 L 11 13" stroke="#000000" stroke-width="2" fill="none"/>
    <circle cx="4" cy="15" r="2.3" fill="#ffffff" stroke="#000000" stroke-width="1.3"/>
    <circle cx="11" cy="13" r="2.3" fill="#ffffff" stroke="#000000" stroke-width="1.3"/>
    <circle cx="4" cy="15" r="1" fill="#000000"/>
    <circle cx="11" cy="13" r="1" fill="#000000"/>
  </g>

  <!-- ===== Frame 1: shell tilted for wobble ===== -->
  <g transform="translate(40,0)">
    <path d="M 6 32 Q 6 24 16 22 Q 28 20 34 26 Q 36 30 32 33 Q 20 37 10 35 Q 6 34 6 32 Z"
          fill="#8fd694" stroke="#000000" stroke-width="2"/>
    <g transform="rotate(-6 26 18)">
      <circle cx="26" cy="18" r="13" fill="#c97a3d" stroke="#000000" stroke-width="2"/>
      <path d="M 26 18 m -9 0 a 9 9 0 1 0 18 0 a 9 9 0 1 0 -18 0" fill="none" stroke="#000000" stroke-width="1.3"/>
      <circle cx="26" cy="18" r="5" fill="none" stroke="#000000" stroke-width="1.3"/>
      <circle cx="26" cy="18" r="1.6" fill="#000000"/>
    </g>
    <path d="M 8 25 L 3 17" stroke="#000000" stroke-width="2" fill="none"/>
    <path d="M 13 24 L 10 14" stroke="#000000" stroke-width="2" fill="none"/>
    <circle cx="3" cy="17" r="2.3" fill="#ffffff" stroke="#000000" stroke-width="1.3"/>
    <circle cx="10" cy="14" r="2.3" fill="#ffffff" stroke="#000000" stroke-width="1.3"/>
    <circle cx="3" cy="17" r="1" fill="#000000"/>
    <circle cx="10" cy="14" r="1" fill="#000000"/>
  </g>
</svg>
